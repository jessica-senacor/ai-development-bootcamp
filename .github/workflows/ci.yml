name: CI

on:
  workflow_dispatch: # hi
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-java:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Java unit tests
        run: ./mvnw test
        working-directory: backend

  test-node:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: .playwright-mcp
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: PLAYWRIGHT_BROWSERS_PATH=.playwright-mcp npx playwright install --with-deps chromium

      - name: Run unit tests
        run: npm run test

      - name: Run BDD tests
        run: npm run test:bdd
