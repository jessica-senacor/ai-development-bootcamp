services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: todoapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todoapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/todoapp
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      # Override via host env: `JWT_SECRET=$(openssl rand -base64 32) docker compose up`.
      # If unset, app falls back to the insecure dev default in application.properties.
      JWT_SECRET: ${JWT_SECRET:-SU5TRUNVUkUtREVWLU9OTFktZGVmYXVsdC1zZWNyZXQtZG8tbm90LXVzZS1pbi1wcm9k}
      JWT_TTL_MINUTES: ${JWT_TTL_MINUTES:-60}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
