spring.application.name=todoapp
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/todoapp}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
# classpath:/static/ is where the Dockerfile copies the frontend for production;
# file:../ serves the repo's index.html/css/src when running locally via
# `mvn spring-boot:run` from backend/, so relative URLs work the same in dev
# and prod without copying files. Do NOT add file:./ — it would expose
# backend/src/main/java/... at /src/**.
spring.web.resources.static-locations=classpath:/static/,file:../

# JWT signing key (Base64-encoded HMAC-SHA256 key, min 32 raw bytes).
# Production MUST inject JWT_SECRET via env/secret manager. The default below decodes
# to "INSECURE-DEV-ONLY-default-secret-do-not-use-in-prod" and exists only so local
# `mvn spring-boot:run` works without extra setup. Never ship this default to prod.
app.security.jwt.secret=${JWT_SECRET:SU5TRUNVUkUtREVWLU9OTFktZGVmYXVsdC1zZWNyZXQtZG8tbm90LXVzZS1pbi1wcm9k}
app.security.jwt.ttl-minutes=${JWT_TTL_MINUTES:60}
